services:
  - type: web
    name: smart-travel-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: smart-travel-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: OPENTRIPMAP_API_KEY
        sync: false
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false

  - type: web
    name: smart-travel-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false

databases:
  - name: smart-travel-db
    databaseName: smart_travel
    user: smart_travel_user
